
services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: food-del-backend
    env_file: ./backend/.env
    ports:
      - "4000:4000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      - mongo
    networks:
      - food-del-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: food-del-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - food-del-network

  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
    container_name: food-del-admin
    ports:
      - "5174:5174"
    volumes:
      - ./admin:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - food-del-network

  mongo:
    image: mongo:7
    container_name: food-del-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - food-del-network

networks:
  food-del-network:
    driver: bridge

volumes:
  mongo-data: